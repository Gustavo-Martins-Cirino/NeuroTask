name: CI Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-lint-test:
    name: Build, Lint and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do Código
        uses: actions/checkout@v4

      - name: Configurar Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          # Habilita o cache automático das dependências do Maven (pasta ~/.m2/repository)
          cache: 'maven'

      - name: Dar permissão de execução ao Maven Wrapper
        run: chmod +x ./mvnw

      - name: Execução do Linting (Checkstyle)
        # Executa a análise estática apontando para o arquivo checkstyle.xml que criamos
        # Falhará a pipeline caso as regras definidas não sejam cumpridas
        run: ./mvnw checkstyle:check -Dcheckstyle.config.location=checkstyle.xml

      - name: Execução dos Testes Automatizados
        # Roda a suíte completa de testes (unitários e integração). 
        # O GitHub Actions interpreta automaticamente erros no JUnit (exit code não-zero) e falha a pipeline processando o status.
        run: ./mvnw test
