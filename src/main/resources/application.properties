spring.mail.password=fcro tbii wmur mpjn
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true


# ========================================
# SPRING BOOT LOGGING
# ========================================
logging.level.com.gustavocirino.myday_productivity=${LOG_LEVEL:INFO}
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# ========================================
# HTTP ENCODING (UTF-8)
# ========================================
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.servlet.encoding.force-request=true
server.servlet.encoding.force-response=true

# ========================================
# JWT CONFIGURATION
# ========================================
# Chave secreta para assinatura JWT (use variável de ambiente em produção!)
# Mínimo de 256 bits (32 caracteres) para HS256
jwt.secret=${JWT_SECRET:neurotask-default-secret-key-please-change-in-production-environment}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

