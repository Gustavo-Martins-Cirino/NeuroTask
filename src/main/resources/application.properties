# ========================================
# APPLICATION INFO
# ========================================
spring.application.name=neurotask

# ========================================
# MYSQL DATABASE CONNECTION
# ========================================
# URL com parâmetros para criar DB automaticamente + configurações UTF-8
spring.datasource.url=jdbc:mysql://localhost:3306/neurotask?createDatabaseIfNotExist=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================================
# HIBERNATE/JPA CONFIGURATION
# ========================================
# DDL Auto: create | create-drop | validate | update | none
# 'update' cria tabelas automaticamente se não existirem
spring.jpa.hibernate.ddl-auto=update

# Show SQL in console (Educational purposes)
spring.jpa.show-sql=true

# Format SQL for readability
spring.jpa.properties.hibernate.format_sql=true

# MySQL Dialect (auto-detectado, mas explícito é melhor)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Show SQL parameter values (optional - verbose)
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ========================================
# SPRING MAIL (E-MAIL DE VERIFICAÇÃO)
# ========================================
# Configuração para Gmail (requer App Password ou similar)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=cirinogustavom@gmail.com
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
# Ignorar validação de certificado SSL/TLS (vacinando contra o erro PKIX)
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com


# ========================================
# SPRING BOOT LOGGING
# ========================================
logging.level.com.gustavocirino.myday_productivity=DEBUG
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# ========================================
# HTTP ENCODING (UTF-8)
# ========================================
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.servlet.encoding.force-request=true
server.servlet.encoding.force-response=true

# ========================================
# GOOGLE GEMINI AI CONFIGURATION
# ========================================
# (Legacy) Configuração antiga do Gemini mantida apenas como referência
# Não é mais utilizada pelo AIClientConfig atual.
#gemini.api.key=
#gemini.model.name=

# ========================================
# OPENAI / OPENAI-COMPATIBLE AI CONFIGURATION
# ========================================
# Insira aqui a sua API key OpenAI ou de um provedor 100% compatível (como Groq em modo OpenAI):
openai.api.key=${GROQ_API_KEY}

# Groq rodando no modo OpenAI-compatível
openai.model.name=llama-3.3-70b-versatile
openai.base.url=https://api.groq.com/openai/v1

# Hiperparâmetros opcionais (usam estes valores se não forem sobrescritos)
openai.temperature=0.7
openai.max.tokens=2048
