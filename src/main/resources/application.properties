# ========================================
# APPLICATION INFO
# ========================================
spring.application.name=neurotask

# ========================================
# MYSQL DATABASE CONNECTION
# ========================================
# Use variáveis de ambiente para credenciais sensíveis
# Configurar DB_PASSWORD, DB_USERNAME e DB_URL no ambiente
spring.datasource.url=jdbc:h2:file:./meubanco;DB_CLOSE_ON_EXIT=FALSE;AUTO_SERVER=TRUE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driverClassName=org.h2.Driver

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.defer-datasource-initialization=true

spring.sql.init.mode=always
spring.jpa.show-sql=true


# ========================================
# SPRING MAIL (E-MAIL DE VERIFICAÇÃO)
# ========================================
# Use variáveis de ambiente para credenciais
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
