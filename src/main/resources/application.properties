# ========================================
# APPLICATION INFO
# ========================================
spring.application.name=neurotask

# ========================================
# MYSQL DATABASE CONNECTION
# ========================================
# Use variáveis de ambiente para credenciais sensíveis
# Configurar DB_PASSWORD, DB_USERNAME e DB_URL no ambiente
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/neurotask?createDatabaseIfNotExist=true&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:@Gucirino01}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ========================================
# HIBERNATE/JPA CONFIGURATION
# ========================================
# DDL Auto: create | create-drop | validate | update | none
# 'update' cria tabelas automaticamente se não existirem
spring.jpa.hibernate.ddl-auto=update

# Show SQL in console (desabilitar em produção)
spring.jpa.show-sql=${SHOW_SQL:false}

# Format SQL for readability
spring.jpa.properties.hibernate.format_sql=true

# MySQL Dialect (auto-detectado, mas explícito é melhor)
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Show SQL parameter values (desabilitado por padrão - verbose)
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=${HIBERNATE_SQL_LOG_LEVEL:OFF}

# ========================================
# SPRING MAIL (E-MAIL DE VERIFICAÇÃO)
# ========================================
# Use variáveis de ambiente para credenciais
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.ssl.trust=${MAIL_HOST:smtp.gmail.com}

# ========================================
# SPRING BOOT LOGGING
# ========================================
logging.level.com.gustavocirino.myday_productivity=${LOG_LEVEL:INFO}
logging.pattern.console=%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# ========================================
# HTTP ENCODING (UTF-8)
# ========================================
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.servlet.encoding.force-request=true
server.servlet.encoding.force-response=true

# ========================================
# JWT CONFIGURATION
# ========================================
# Chave secreta para assinatura JWT (use variável de ambiente em produção!)
# Mínimo de 256 bits (32 caracteres) para HS256
jwt.secret=${JWT_SECRET:neurotask-default-secret-key-please-change-in-production-environment}
jwt.expiration=${JWT_EXPIRATION:86400000}
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# ========================================
# OPENAI / OPENAI-COMPATIBLE AI CONFIGURATION
# ========================================
# Use variáveis de ambiente para API keys
openai.api.key=${OPENAI_API_KEY:chave_temporaria_para_nao_quebrar_o_boot}
openai.model.name=${OPENAI_MODEL:llama-3.3-70b-versatile}
openai.base.url=${OPENAI_BASE_URL:https://api.groq.com/openai/v1}
openai.temperature=${OPENAI_TEMPERATURE:0.7}
openai.max.tokens=${OPENAI_MAX_TOKENS:2048}

# ========================================
# CORS CONFIGURATION
# ========================================
# Origens permitidas (separadas por vírgula)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:8080,http://localhost:3000}
